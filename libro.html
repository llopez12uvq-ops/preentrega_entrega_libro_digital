<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Libro digital | Planes de Transformación Digital</title><style>:root{--azul:#00AEEF;--azul-oscuro:#0078B8;--azul-suave:#EAF8FE;--gris-fondo:#ECECEC;--gris-pagina:#F5F5F5;--gris-linea:#D9D9D9;--texto:#222;--naranja:#F5A623;--sombra:0 10px 30px rgba(0,0,0,.10)}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--texto);background:var(--gris-fondo)}a{color:inherit}.topbar{background:#fff;border-bottom:1px solid var(--gris-linea)}.topbar-inner{width:min(1260px,94%);margin:0 auto;padding:14px 0;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}.topbar strong{color:var(--azul-oscuro);font-size:.95rem}.topbar nav{display:flex;gap:10px;flex-wrap:wrap}.btn{display:inline-block;text-decoration:none;border:none;padding:12px 16px;font-size:.92rem;font-weight:800;cursor:pointer;background:#ECECEC;color:#333}.primario{background:var(--azul);color:#fff}.layout{width:min(1260px,94%);margin:26px auto 50px}.visor{background:#fff;border:1px solid var(--gris-linea);box-shadow:var(--sombra)}.visor-body{background:#EAEAEA;padding:28px;min-height:900px}.libro{display:flex;flex-direction:column;gap:28px}.pagina{width:210mm;min-height:297mm;margin:0 auto;background:var(--gris-pagina);border:1px solid #DADADA;position:relative;box-shadow:0 8px 26px rgba(0,0,0,.10);overflow:hidden}.pagina-inner{min-height:297mm;padding:24mm 22mm 20mm 24mm}.numero{position:absolute;left:18mm;bottom:10mm;font-family:"Times New Roman",Times,serif;font-size:11pt;font-weight:700;color:#111}.marca{position:absolute;right:18mm;bottom:10mm;font-size:10pt;color:#2f2f2f;background:rgba(255,255,255,.88);padding:6px 14px;border-radius:999px;box-shadow:0 6px 18px rgba(0,0,0,.10)}.texto{font-family:"Times New Roman",Times,serif;font-size:11pt;line-height:1.5;color:#222}.texto p{margin:0 0 10px;text-align:justify;white-space:pre-wrap}.texto h1,.texto h2{font-family:Arial,Helvetica,sans-serif;color:var(--azul);font-weight:900;line-height:1.04}.texto h1{font-size:30pt}.texto h2{font-size:26pt;margin:0 0 18px}.texto h3{margin:20px 0 8px;font-family:Arial,Helvetica,sans-serif;font-size:15pt;color:var(--azul);font-weight:900}.meta{font-size:10.4pt;line-height:1.6;color:#3E3E3E;margin-bottom:14px}.badge{display:inline-block;padding:7px 12px;border-radius:999px;background:var(--azul-suave);color:var(--azul-oscuro);font-family:Arial,Helvetica,sans-serif;font-size:10pt;font-weight:800;margin-bottom:12px}.sumario{display:grid;grid-template-columns:1fr auto;gap:12px;margin:12px 0;padding:12px 0;border-bottom:1px solid #E2E2E2}.parte{background:linear-gradient(135deg,rgba(255,255,255,.95),rgba(255,255,255,.86)),url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1400&q=80") center/cover no-repeat}.parte .pagina-inner{display:flex;align-items:center;justify-content:center}.parte-box{background:rgba(255,255,255,.88);border-left:8px solid var(--azul);padding:34px 38px;border-radius:18px;max-width:620px}.aviso{max-width:900px;margin:0 auto;background:#fff;border-left:6px solid var(--azul);padding:18px 20px;line-height:1.6}@media(max-width:1100px){.visor-body{overflow:auto}.pagina{width:100%;min-height:auto}.pagina-inner{min-height:auto;padding:28px 22px 58px}.texto h1{font-size:2.2rem}.texto h2{font-size:2rem}}@media print{body{background:#fff}.topbar{display:none!important}.layout{display:block;width:100%;margin:0}.visor,.visor-body{background:#fff;border:none;box-shadow:none;padding:0}.libro{gap:0}.pagina{width:210mm;min-height:297mm;margin:0;border:none;box-shadow:none;page-break-after:always}}</style></head><body><div class="topbar"><div class="topbar-inner"><strong>Libro digital · Preentregas y entregas finales</strong><nav><a href="index.html" class="btn">Inicio</a><a href="carga.html" class="btn">Cargar preentrega</a><a href="entrega-final.html" class="btn">Cargar entrega final</a><button type="button" class="btn primario" onclick="window.print()">Imprimir / guardar en PDF</button></nav></div></div><main class="layout"><section class="visor"><div class="visor-body"><div id="libro" class="libro"><div class="aviso">Cargando entregas...</div></div></div></section></main><script>
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbwq0eKhJNEngDG3DxagVBvmG3gzm2lHsWwNustO0d5fDTtd2Jf4mNNuwLCI3-ZpyPLh6A/exec";const libro=document.getElementById('libro');
function e(t=''){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
function page(c,m='Libro digital',n=''){return `<article class="pagina"><div class="pagina-inner">${c}</div>${n!==''?`<div class="numero">${n}</div>`:''}<div class="marca">${m}</div></article>`}
function cover(){return page(`<div class="texto"><p class="badge">Libro digital académico</p><h1>Planes de Transformación Digital con Inteligencia Artificial (IA) y Tecnologías Emergentes</h1><p>Preentregas y entregas finales de la asignatura <em>Plataformas, economía y transformación digital</em>.</p><p>Esta publicación reúne dos instancias del proceso de trabajo: la delimitación inicial del caso y el desarrollo final del Plan de Transformación Digital con Tecnologías Habilitadoras.</p></div>`,'Libro digital')}
function intro(){return page(`<div class="texto"><h2>Introducción</h2><p>Este libro digital reúne el proceso de elaboración de los trabajos finales de la asignatura. Cada producción incorpora dos instancias diferenciadas: una preentrega, centrada en la delimitación del caso y del problema, y una entrega final, destinada al desarrollo del Plan de Transformación Digital con Tecnologías Habilitadoras.</p><p>La organización en dos partes permite visualizar el avance del trabajo, desde la formulación inicial hasta la construcción de una propuesta de intervención fundamentada.</p><h3>Criterios de elaboración</h3><p>El trabajo final consiste en la elaboración de un Plan de Transformación Digital con Tecnologías Habilitadoras, aplicado a una organización real o hipotética. La propuesta debe incorporar al menos una tecnología disruptiva —IA, IoT o Industria 4.0— para optimizar un área clave de la organización, como marketing, operaciones o finanzas.</p></div>`,'Introducción',2)}
function indice(pre,fin){
  const paginaParteI=4;
  const paginaInicioPre=5;
  const paginaParteII=paginaInicioPre+pre.length;
  const paginaInicioFinal=paginaParteII+1;
  let p=pre.length?pre.map((x,i)=>`<div class="sumario"><div><strong><a href="#pre-${i+1}">${e(x.titulo)}</a></strong><br>${e(x.autor)}</div><div>p. ${paginaInicioPre+i}</div></div>`).join(''):'<p>Sin preentregas incorporadas.</p>';
  let f=fin.length?fin.map((x,i)=>`<div class="sumario"><div><strong><a href="#final-${i+1}">${e(x.final_titulo_definitivo||x.titulo)}</a></strong><br>${e(x.autor)}</div><div>p. ${paginaInicioFinal+i}</div></div>`).join(''):'<p>Sin entregas finales incorporadas.</p>';
  return page(`<div class="texto"><h2>Contenido</h2><h3>Parte I. Preentregas</h3><div class="sumario"><div><strong><a href="#parte-i">Apertura de Parte I</a></strong></div><div>p. ${paginaParteI}</div></div>${p}<h3>Parte II. Entregas finales</h3><div class="sumario"><div><strong><a href="#parte-ii">Apertura de Parte II</a></strong></div><div>p. ${paginaParteII}</div></div>${f}</div>`,'Contenido',1)
}
function parte(t,d,m,n='',id=''){return `<article class="pagina parte" ${id?`id="${id}"`:''}><div class="pagina-inner"><div class="parte-box texto"><p class="badge">${m}</p><h2>${e(t)}</h2><p>${e(d)}</p></div></div>${n!==''?`<div class="numero">${n}</div>`:''}<div class="marca">${m}</div></article>`}
function prePage(x,i,n){return page(`<div class="texto" id="pre-${i+1}"><p class="badge">Preentrega</p><h2>${e(x.titulo)}</h2><p class="meta"><strong>Autor/a o integrantes:</strong> ${e(x.autor)}<br><strong>Correo(s):</strong> ${e(x.correo)}<br><strong>Emprendimiento:</strong> ${e(x.organizacion)}<br><strong>Sector:</strong> ${e(x.sector||'No especificado')}<br><strong>Palabras clave:</strong> ${e(x.palabrasClave||'No especificadas')}</p><h3>Área de intervención seleccionada</h3><p>${e(x.pre_area)}</p><h3>Problema, necesidad u oportunidad detectada</h3><p>${e(x.pre_problema)}</p><h3>Contextualización</h3><p>${e(x.pre_contexto)}</p><h3>Breve caracterización</h3><p>${e(x.pre_mejora)}</p><h3>Bibliografía inicial</h3><p>${e(x.pre_bibliografia)}</p></div>`,'Parte I · Preentregas',n)}
function finalPage(x,i,n){return page(`<div class="texto" id="final-${i+1}"><p class="badge">Entrega final</p><h2>${e(x.final_titulo_definitivo||x.titulo)}</h2><p class="meta"><strong>Autor/a o integrantes:</strong> ${e(x.autor)}<br><strong>Correo(s):</strong> ${e(x.correo)}<br><strong>Emprendimiento:</strong> ${e(x.organizacion)}<br><strong>Sector:</strong> ${e(x.sector||'No especificado')}<br><strong>Palabras clave:</strong> ${e(x.palabrasClave||'No especificadas')}</p><h3>Síntesis del caso y del problema</h3><p>${e(x.final_sintesis)}</p><h3>Tecnología habilitadora seleccionada</h3><p>${e(x.final_tecnologia)}</p><h3>Plan de Transformación Digital</h3><p>${e(x.final_plan)}</p><h3>Justificación teórica</h3><p>${e(x.final_justificacion)}</p><h3>Potencial de valor</h3><p>${e(x.final_valor)}</p><h3>Requerimientos de inversión y gestión</h3><p>${e(x.final_requerimientos)}</p><h3>Conclusiones</h3><p>${e(x.final_conclusiones)}</p><h3>Bibliografía final</h3><p>${e(x.final_bibliografia)}</p></div>`,'Parte II · Entregas finales',n)}
function renderLibroDesdeDatos(data){
  const pre=Array.isArray(data)?data:(data.preentregas||[]);
  const fin=Array.isArray(data)?[]:(data.finales||[]);
  const paginaParteI=4;
  const paginaInicioPre=5;
  const paginaParteII=paginaInicioPre+pre.length;
  const paginaInicioFinal=paginaParteII+1;

  let h=cover()+indice(pre,fin)+intro()+parte('Parte I. Preentregas','Delimitación inicial del caso, el área de intervención y el problema, necesidad u oportunidad detectada.','Parte I',paginaParteI,'parte-i');

  h+=pre.length?pre.map((x,i)=>prePage(x,i,paginaInicioPre+i)).join(''):page('<div class="texto"><h2>Parte I. Preentregas</h2><p>No hay preentregas incorporadas.</p></div>','Parte I',paginaInicioPre);

  h+=parte('Parte II. Entregas finales','Desarrollo del Plan de Transformación Digital con Tecnologías Habilitadoras.','Parte II',paginaParteII,'parte-ii');

  h+=fin.length?fin.map((x,i)=>finalPage(x,i,paginaInicioFinal+i)).join(''):page('<div class="texto"><h2>Parte II. Entregas finales</h2><p>No hay entregas finales incorporadas.</p></div>','Parte II',paginaInicioFinal);

  libro.innerHTML=h;
}
function cargarEntregas(){const s=document.createElement('script');const sep=WEB_APP_URL.includes('?')?'&':'?';s.src=WEB_APP_URL+sep+'callback=renderLibroDesdeDatos&tipo=todo&v='+Date.now();s.onerror=()=>{libro.innerHTML='<div class="aviso"><strong>No se pudieron cargar las entregas.</strong><br>Revisá que el Web App esté publicado con acceso para cualquier usuario y que la URL sea correcta.</div>';};document.body.appendChild(s);}cargarEntregas();
</script></body></html>
